<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USFORCE8 — Plataforma de Gestão Multi-Marca</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="config.js"></script>

<style>
  :root { color-scheme: light; }
  html, body { font-family: 'Inter', system-ui, sans-serif; color: #0F1B3D; }
  body { background: #F4F6FB; }
  .font-display { font-family: 'Barlow Condensed', sans-serif; }
  ::placeholder { color: rgba(15,27,61,0.35); }
  svg.lucide { stroke-width: 1.75; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function () {
      // lucide UMD v0.469 exposes each icon as an OWN property on window.lucide,
      // shaped [tagName, attrs, childrenArray] (children = [[tag, attrs], ...]).
      const orig = window.lucide || {};
      function makeIcon(data) {
        return function LucideIcon(props) {
          const { size = 18, color = 'currentColor', strokeWidth = 1.75, className = '', ...rest } = props || {};
          const baseAttrs = {
            xmlns: 'http://www.w3.org/2000/svg',
            width: size, height: size, viewBox: '0 0 24 24',
            fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round',
            className: 'lucide ' + className, ...rest,
          };
          let children = [];
          if (Array.isArray(data) && data.length >= 3 && Array.isArray(data[2])) {
            children = data[2].map((c, i) => React.createElement(c[0], { key: i, ...c[1] }));
          } else if (data && data.iconNode) {
            children = data.iconNode.map((c, i) => React.createElement(c[0], { key: i, ...c[1] }));
          }
          return React.createElement('svg', baseAttrs, ...children);
        };
      }
      Object.keys(orig).forEach((k) => {
        const v = orig[k];
        if (Array.isArray(v) && v.length >= 3 && Array.isArray(v[2])) {
          orig[k] = makeIcon(v);
        } else if (v && v.iconNode) {
          orig[k] = makeIcon(v);
        }
      });
      window.lucide = new Proxy(orig, {
        get(target, name) {
          if (name in target) return target[name];
          if (typeof name === 'symbol') return undefined;
          return function Missing() { return null; };
        },
        has() { return true; },
      });
    })();
  </script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="views/login.jsx"></script>
  <script type="text/babel" src="views/admin.jsx"></script>
  <script type="text/babel" src="views/product-form.jsx"></script>
  <script type="text/babel" src="views/showcase.jsx"></script>
  <script type="text/babel" src="views/product-detail.jsx"></script>
  <script type="text/babel" src="views/catalog-admin.jsx"></script>
  <script type="text/babel" src="views/catalog-preview.jsx"></script>
  <script type="text/babel" src="views/layout-editor.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Supabase client (null se não configurado) ─────────────────────────────
    const _cfg = window.USFORCE_CONFIG?.supabase;
    const sb   = (_cfg?.url && !_cfg.url.includes('COLE_AQUI'))
      ? window.supabase.createClient(_cfg.url, _cfg.anonKey)
      : null;

    // ── Adaptadores DB ↔ App ──────────────────────────────────────────────────
    const fromDb = {
      product: (p) => ({
        id: p.id, companySlug: p.company_slug, category: p.category,
        name: p.name, code: p.code, short: p.short, long: p.long,
        unitsPerBox: p.units_per_box, origin: p.origin, active: p.active,
        sharedWith: p.shared_with || [], images: p.images || [],
        createdAt: p.created_at,
      }),
    };
    const toDb = {
      product: (p) => ({
        id: p.id, company_slug: p.companySlug, category: p.category,
        name: p.name, code: p.code, short: p.short, long: p.long,
        units_per_box: p.unitsPerBox, origin: p.origin, active: p.active,
        shared_with: p.sharedWith, images: p.images, created_at: p.createdAt,
      }),
      holding: (h)  => ({ id: h.id, name: h.name }),
      company: (c, holdingId) => ({ slug: c.slug, name: c.name, tagline: c.tagline, accent: c.accent, holding_id: holdingId }),
      brand:   (b, companySlug) => ({ slug: b.slug, name: b.name, tagline: b.tagline, accent: b.accent, company_slug: companySlug }),
    };

    // ── localStorage helpers ──────────────────────────────────────────────────
    const LS_KEYS = { configs: 'uf8_catalog_configs', covers: 'uf8_category_covers', logos: 'uf8_entity_logos', catColors: 'uf8_category_colors' };
    const lsGet = (key) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } };
    const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    function App() {
      const [products,          setProducts]          = useState(window.USFORCE_DATA.PRODUCTS);
      const [holdings,          setHoldings]          = useState(window.USFORCE_DATA.HOLDINGS);
      const [categories,        setCategories]        = useState(window.USFORCE_DATA.CATEGORIES);
      const [heroImages,        setHeroImages]        = useState(window.USFORCE_DATA.HERO_IMAGES);
      const [catalogConfigs,    setCatalogConfigs]    = useState(() => lsGet(LS_KEYS.configs) || {});
      const [categoryCoverUrls, setCategoryCoverUrls] = useState(() => lsGet(LS_KEYS.covers)  || {});
      const [entityLogos,       setEntityLogos]       = useState(() => lsGet(LS_KEYS.logos)   || {});
      const [categoryColors,    setCategoryColors]    = useState(() => lsGet(LS_KEYS.catColors) || {});
      const [dbReady,           setDbReady]           = useState(!sb);

      // ── Carrega dados do Supabase na inicialização ──────────────────────────
      useEffect(() => {
        if (!sb) return;
        (async () => {
          try {
            const [
              { data: prods    },
              { data: holds    },
              { data: comps    },
              { data: brnds    },
              { data: cats     },
              { data: catCfgs  },
              { data: catCovs  },
              { data: entLogos },
            ] = await Promise.all([
              sb.from('products').select('*').order('created_at', { ascending: false }),
              sb.from('holdings').select('*'),
              sb.from('companies').select('*'),
              sb.from('brands').select('*'),
              sb.from('categories').select('*'),
              sb.from('catalog_configs').select('*'),
              sb.from('category_covers').select('*'),
              sb.from('entity_logos').select('*'),
            ]);

            if (prods?.length)  setProducts(prods.map(fromDb.product));

            if (holds?.length) {
              const tree = holds.map(h => ({
                id: h.id, name: h.name,
                companies: (comps || [])
                  .filter(c => c.holding_id === h.id)
                  .map(c => ({
                    slug: c.slug, name: c.name, tagline: c.tagline, accent: c.accent,
                    brands: (brnds || [])
                      .filter(b => b.company_slug === c.slug)
                      .map(b => ({ slug: b.slug, name: b.name, tagline: b.tagline, accent: b.accent })),
                  })),
              }));
              setHoldings(tree);
            }

            if (cats?.length) {
              const map = {};
              const colorMap = {};
              cats.forEach(c => {
                (map[c.entity_slug] = map[c.entity_slug] || []).push(c.name);
                if (c.accent) { (colorMap[c.entity_slug] = colorMap[c.entity_slug] || {})[c.name] = c.accent; }
              });
              setCategories(map);
              setCategoryColors(prev => { const n = { ...prev, ...colorMap }; lsSet(LS_KEYS.catColors, n); return n; });
            }
            if (catCfgs?.length) {
              const map = {};
              catCfgs.forEach(c => {
                map[c.entity_slug] = {
                  coverUrl:           c.cover_url,
                  backCoverUrl:       c.back_cover_url || '',
                  template:           c.template,
                  showCategoryCovers: c.show_category_covers ?? true,
                  showBrandDividers:  c.show_brand_dividers  ?? true,
                  layout:             c.layout || null,
                };
              });
              setCatalogConfigs(prev => { const n = { ...prev, ...map }; lsSet(LS_KEYS.configs, n); return n; });
            }
            if (catCovs?.length) {
              const map = {};
              catCovs.forEach(c => {
                if (!map[c.entity_slug]) map[c.entity_slug] = {};
                map[c.entity_slug][c.category_name] = c.cover_url;
              });
              setCategoryCoverUrls(prev => { const n = { ...prev, ...map }; lsSet(LS_KEYS.covers, n); return n; });
            }
            if (entLogos?.length) {
              const map = {};
              entLogos.forEach(l => { map[l.entity_slug] = l.logo_url; });
              setEntityLogos(prev => { const n = { ...prev, ...map }; lsSet(LS_KEYS.logos, n); return n; });
            }
          } catch (e) {
            console.warn('Supabase: usando dados locais.', e.message);
          }
          setDbReady(true);
        })();
      }, []);

      // ── Realtime: sincroniza produtos novos/editados/excluídos automaticamente ──
      useEffect(() => {
        if (!sb) return;
        const ch = sb.channel('public:products')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (payload) => {
            if (payload.eventType === 'DELETE') {
              setProducts(list => list.filter(p => p.id !== payload.old.id));
            } else {
              const incoming = fromDb.product(payload.new);
              setProducts(list => {
                const idx = list.findIndex(p => p.id === incoming.id);
                if (idx >= 0) { const next = [...list]; next[idx] = incoming; return next; }
                return [incoming, ...list];
              });
            }
          })
          .subscribe();
        return () => { sb.removeChannel(ch); };
      }, []);

      // ── Roteamento por hash (#vitrine/slug) ──────────────────────────────────
      const parseHash = () => {
        const m = window.location.hash.match(/^#vitrine\/([^/]+)/);
        return m ? m[1] : null;
      };
      const hashSlug = parseHash();

      const [state, setState] = useState({
        view:               hashSlug ? 'public-showcase' : 'login',
        isAuthenticated:    false,
        selectedCompanySlug: hashSlug || null,
        selectedProductId:  null,
        editingProduct:     null,
        toast:              null,
      });

      const navigate = (patch) => setState(s => {
        const next = { ...s, ...patch };
        // Sincroniza URL
        if (next.view === 'public-showcase' && next.selectedCompanySlug) {
          history.replaceState(null, '', `#vitrine/${next.selectedCompanySlug}`);
        } else if (next.view === 'public-product-detail' && next.selectedCompanySlug) {
          history.replaceState(null, '', `#vitrine/${next.selectedCompanySlug}`);
        } else if (!next.view.startsWith('public-')) {
          history.replaceState(null, '', window.location.pathname);
        }
        return next;
      });

      // Botão voltar do browser
      useEffect(() => {
        const onPop = () => {
          const slug = parseHash();
          if (slug) setState(s => ({ ...s, view: 'public-showcase', selectedCompanySlug: slug, selectedProductId: null }));
          else if (!state.isAuthenticated) setState(s => ({ ...s, view: 'login' }));
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, [state.isAuthenticated]);

      const toast = (msg, type = 'success') => {
        setState(s => ({ ...s, toast: { type, msg } }));
        setTimeout(() => setState(s => ({ ...s, toast: null })), 3000);
      };

      const handleLogin = async ({ email, password }) => {
        if (!sb) return 'Banco de dados não disponível';
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) return error.message === 'Invalid login credentials'
          ? 'E-mail ou senha incorretos'
          : error.message;
        navigate({ view: 'admin-dashboard', isAuthenticated: true, adminEmail: email });
      };
      const handleLogout = async () => {
        if (sb) await sb.auth.signOut();
        navigate({ view: 'login', isAuthenticated: false, selectedCompanySlug: null, selectedProductId: null });
      };

      const handleNewProduct  = () => navigate({ view: 'admin-product-form', editingProduct: null });
      const handleEditProduct = (p) => navigate({ view: 'admin-product-form', editingProduct: p });
      const handleDuplicateProduct = (p) => {
        const copy = {
          ...p,
          id: (crypto?.randomUUID?.() || `p_${Date.now()}_${Math.random().toString(36).slice(2,8)}`),
          name: `${p.name} (cópia)`,
          code: '',
          createdAt: new Date().toISOString(),
        };
        navigate({ view: 'admin-product-form', editingProduct: copy });
      };

      const handleSaveProduct = async (product, publish) => {
        setProducts(list => {
          const exists = list.some(p => p.id === product.id);
          if (exists) return list.map(p => p.id === product.id ? product : p);
          return [product, ...list];
        });
        if (sb) {
          const { error } = await sb.from('products').upsert(toDb.product(product));
          if (error) console.error('Supabase save product:', error.message);
        }
        navigate({ view: 'admin-dashboard', editingProduct: null });
        toast(publish ? 'Produto publicado com sucesso' : 'Rascunho salvo');
      };

      // Add a new top-level holding
      const handleCreateHolding = async (holding) => {
        setHoldings(list => [...list, { ...holding, companies: [] }]);
        if (sb) {
          const { error } = await sb.from('holdings').insert(toDb.holding(holding));
          if (error) console.error('Supabase save holding:', error.message);
        }
        toast(`Holding ${holding.name} cadastrada`);
      };

      // Add a company under a holding
      const handleCreateCompany = async (holdingId, company, cats) => {
        setHoldings(list => list.map(h =>
          h.id === holdingId
            ? { ...h, companies: [...h.companies, { ...company, brands: [] }] }
            : h
        ));
        const finalCats = cats.length ? cats : ['Geral'];
        setCategories(c => ({ ...c, [company.slug]: finalCats }));
        if (sb) {
          await sb.from('companies').insert(toDb.company(company, holdingId));
          await sb.from('categories').insert(finalCats.map(name => ({ entity_slug: company.slug, name })));
        }
        toast(`Empresa ${company.name} cadastrada`);
      };

      // Add a brand under a company
      const handleCreateBrand = async (companySlug, brand, cats) => {
        setHoldings(list => list.map(h => ({
          ...h,
          companies: h.companies.map(c =>
            c.slug === companySlug
              ? { ...c, brands: [...(c.brands || []), brand] }
              : c
          ),
        })));
        const finalCats = cats.length ? cats : ['Geral'];
        setCategories(c => ({ ...c, [brand.slug]: finalCats }));
        if (sb) {
          await sb.from('brands').insert(toDb.brand(brand, companySlug));
          await sb.from('categories').insert(finalCats.map(name => ({ entity_slug: brand.slug, name })));
        }
        toast(`Marca ${brand.name} cadastrada`);
      };

      const handleUpdateCompany = async (slug, holdingId, data) => {
        setHoldings(list => list.map(h =>
          h.id === holdingId
            ? { ...h, companies: h.companies.map(c => c.slug === slug ? { ...c, ...data } : c) }
            : h
        ));
        if (sb) {
          const { error } = await sb.from('companies').update({ name: data.name, tagline: data.tagline, accent: data.accent }).eq('slug', slug);
          if (error) console.error('Supabase update company:', error.message);
        }
        toast(`${data.name} atualizado`);
      };

      const handleUpdateBrand = async (slug, companySlug, data) => {
        setHoldings(list => list.map(h => ({
          ...h,
          companies: h.companies.map(c =>
            c.slug === companySlug
              ? { ...c, brands: (c.brands || []).map(b => b.slug === slug ? { ...b, ...data } : b) }
              : c
          ),
        })));
        if (sb) {
          const { error } = await sb.from('brands').update({ name: data.name, tagline: data.tagline, accent: data.accent }).eq('slug', slug);
          if (error) console.error('Supabase update brand:', error.message);
        }
        toast(`${data.name} atualizado`);
      };

      const handleUpdateHero = (slug, hero) => {
        setHeroImages(h => ({ ...h, [slug]: hero }));
        toast('Capa atualizada');
      };

      const handleAddCategory = async (slug, name) => {
        setCategories(c => ({ ...c, [slug]: [...(c[slug] || []), name] }));
        if (sb) {
          const { error } = await sb.from('categories').insert({ entity_slug: slug, name });
          if (error) console.error('Supabase add category:', error.message);
        }
      };
      const handleDeleteProduct = async (productId) => {
        setProducts(list => list.filter(p => p.id !== productId));
        if (sb) {
          const { error } = await sb.from('products').delete().eq('id', productId);
          if (error) console.error('Supabase delete product:', error.message);
        }
        toast('Produto excluído');
      };

      const handleSaveCatalogConfig = async (slug, config, catCovers) => {
        setCatalogConfigs(m => { const n = { ...m, [slug]: { ...(m[slug] || {}), ...config } }; lsSet(LS_KEYS.configs, n); return n; });
        setCategoryCoverUrls(m => { const n = { ...m, [slug]: catCovers }; lsSet(LS_KEYS.covers, n); return n; });
        if (sb) {
          await sb.from('catalog_configs').upsert({
            entity_slug:          slug,
            cover_url:            config.coverUrl        || null,
            back_cover_url:       config.backCoverUrl    || null,
            template:             config.template,
            show_category_covers: config.showCategoryCovers ?? true,
            show_brand_dividers:  config.showBrandDividers  ?? true,
            updated_at:           new Date().toISOString(),
          });
          const rows = Object.entries(catCovers).map(([category_name, cover_url]) => ({ entity_slug: slug, category_name, cover_url }));
          if (rows.length) await sb.from('category_covers').upsert(rows, { onConflict: 'entity_slug,category_name' });
        }
        toast('Catálogo salvo com sucesso');
      };

      const handleSaveCatalogLayout = async (slug, layout) => {
        setCatalogConfigs(m => { const n = { ...m, [slug]: { ...(m[slug] || {}), layout } }; lsSet(LS_KEYS.configs, n); return n; });
        if (sb) {
          const { error } = await sb.from('catalog_configs').upsert({
            entity_slug: slug,
            layout:      layout,
            updated_at:  new Date().toISOString(),
          });
          if (error) console.error('Supabase save layout:', error.message);
        }
        toast('Layout salvo com sucesso');
      };

      const handleSaveEntityLogo = async (slug, logoUrl) => {
        setEntityLogos(m => { const n = { ...m, [slug]: logoUrl }; lsSet(LS_KEYS.logos, n); return n; });
        if (sb) {
          const { error } = await sb.from('entity_logos').upsert({
            entity_slug: slug,
            logo_url:    logoUrl || null,
            updated_at:  new Date().toISOString(),
          });
          if (error) console.error('Supabase save logo:', error.message);
        }
        toast(logoUrl ? 'Logo salvo com sucesso' : 'Logo removido');
      };

      const handleSetCategoryColor = async (slug, name, accent) => {
        setCategoryColors(m => {
          const n = { ...m, [slug]: { ...(m[slug] || {}), [name]: accent || null } };
          if (!accent) delete n[slug][name];
          lsSet(LS_KEYS.catColors, n); return n;
        });
        if (sb) {
          const { error } = await sb.from('categories').update({ accent: accent || null }).eq('entity_slug', slug).eq('name', name);
          if (error) console.error('Supabase set category color:', error.message);
        }
      };

      const handleDeleteCategory = async (slug, name) => {
        setCategories(c => ({ ...c, [slug]: (c[slug] || []).filter(n => n !== name) }));
        if (sb) {
          const { error } = await sb.from('categories').delete().eq('entity_slug', slug).eq('name', name);
          if (error) console.error('Supabase delete category:', error.message);
        }
      };

      const handleSelectProduct  = (p) => navigate({ view: 'public-product-detail', selectedProductId: p.id, selectedCompanySlug: p.companySlug });
      const handleBackToAdmin    = () => state.isAuthenticated
        ? navigate({ view: 'admin-dashboard', selectedProductId: null })
        : navigate({ view: 'public-showcase', selectedProductId: null });

      useEffect(() => {
        if (!state.isAuthenticated && state.view.startsWith('admin-')) {
          navigate({ view: 'login' });
        }
      }, [state.isAuthenticated, state.view]);

      const selectedProduct = state.selectedProductId ? products.find(p => p.id === state.selectedProductId) : null;

      // Tela de carregamento enquanto busca dados do Supabase
      if (!dbReady) return (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'#0F1B3D', flexDirection:'column', gap:'16px' }}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" className="animate-spin">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          </svg>
          <span style={{ color:'rgba(255,255,255,0.5)', fontSize:'11px', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.2em' }}>
            Carregando USFORCE8…
          </span>
        </div>
      );

      return (
        <>
          {state.view === 'login' && <LoginView onLogin={handleLogin} />}

          {state.view === 'admin-dashboard' && (
            <AdminView
              products={products} holdings={holdings} categories={categories}
              onNavigate={navigate} onLogout={handleLogout}
              onNewProduct={handleNewProduct} onEditProduct={handleEditProduct}
              onDuplicateProduct={handleDuplicateProduct}
              onDeleteProduct={handleDeleteProduct}
              onCreateHolding={handleCreateHolding}
              onCreateCompany={handleCreateCompany}
              onCreateBrand={handleCreateBrand}
              onUpdateCompany={handleUpdateCompany}
              onUpdateBrand={handleUpdateBrand}
              adminEmail={state.adminEmail}
              catalogConfigs={catalogConfigs}
            />
          )}

          {state.view === 'admin-product-form' && (
            <ProductFormView
              initialProduct={state.editingProduct}
              holdings={holdings} categories={categories}
              categoryColors={categoryColors}
              onCancel={() => navigate({ view: 'admin-dashboard', editingProduct: null })}
              onSave={handleSaveProduct} onLogout={handleLogout}
              onAddCategory={handleAddCategory}
              onDeleteCategory={handleDeleteCategory}
              onSetCategoryColor={handleSetCategoryColor}
            />
          )}

          {state.view === 'public-showcase' && state.selectedCompanySlug && (
            <PublicShowcaseView
              companySlug={state.selectedCompanySlug}
              products={products} holdings={holdings} categories={categories}
              heroImage={heroImages[state.selectedCompanySlug]}
              onSelectProduct={handleSelectProduct}
              onBackToAdmin={handleBackToAdmin}
              onUpdateHero={handleUpdateHero}
              fromAdmin={state.isAuthenticated}
              catalogConfig={catalogConfigs[state.selectedCompanySlug]}
              onOpenCatalog={() => navigate({ view: 'catalog-preview' })}
            />
          )}

          {state.view === 'catalog-admin' && state.selectedCompanySlug && (() => {
            const { buildEntityMap } = window.USFORCE_DATA;
            const em = buildEntityMap(holdings);
            const ent = em[state.selectedCompanySlug];
            return (
              <CatalogAdminView
                entitySlug={state.selectedCompanySlug}
                entity={ent}
                holdings={holdings}
                categories={categories}
                catalogConfig={catalogConfigs[state.selectedCompanySlug]}
                categoryCoverUrls={categoryCoverUrls[state.selectedCompanySlug] || {}}
                entityLogos={entityLogos}
                onSave={handleSaveCatalogConfig}
                onSaveLogo={handleSaveEntityLogo}
                onPreview={() => navigate({ view: 'catalog-preview' })}
                onEditLayout={() => navigate({ view: 'layout-editor' })}
                onBack={() => navigate({ view: 'admin-dashboard' })}
              />
            );
          })()}

          {state.view === 'catalog-preview' && state.selectedCompanySlug && (() => {
            const { buildEntityMap } = window.USFORCE_DATA;
            const em = buildEntityMap(holdings);
            const ent = em[state.selectedCompanySlug];
            return (
              <CatalogPreviewView
                entitySlug={state.selectedCompanySlug}
                entity={ent}
                products={products}
                holdings={holdings}
                categories={categories}
                categoryColors={categoryColors}
                catalogConfig={catalogConfigs[state.selectedCompanySlug] || {}}
                categoryCoverUrls={categoryCoverUrls[state.selectedCompanySlug] || {}}
                entityLogos={entityLogos}
                fromAdmin={state.isAuthenticated}
                onBack={() => navigate({ view: state.isAuthenticated ? 'admin-dashboard' : 'public-showcase' })}
                onGoAdmin={state.isAuthenticated ? () => navigate({ view: 'catalog-admin' }) : null}
              />
            );
          })()}

          {state.view === 'layout-editor' && state.selectedCompanySlug && (() => {
            const { buildEntityMap } = window.USFORCE_DATA;
            const em = buildEntityMap(holdings);
            const ent = em[state.selectedCompanySlug];
            return (
              <LayoutEditorView
                entitySlug={state.selectedCompanySlug}
                entity={ent}
                holdings={holdings}
                products={products}
                categories={categories}
                catalogConfig={catalogConfigs[state.selectedCompanySlug] || {}}
                entityLogos={entityLogos}
                onSave={handleSaveCatalogLayout}
                onBack={() => navigate({ view: 'catalog-admin' })}
              />
            );
          })()}

          {state.view === 'public-product-detail' && selectedProduct && (
            <PublicProductDetailView
              product={selectedProduct} products={products} holdings={holdings}
              onBack={() => navigate({ view: 'public-showcase', selectedCompanySlug: state.selectedCompanySlug })}
              onSelectProduct={handleSelectProduct}
              onBackToAdmin={handleBackToAdmin}
              fromAdmin={state.isAuthenticated}
            />
          )}

          {state.toast && (
            <div className="fixed bottom-6 right-6 z-50 bg-[#0F1B3D] text-white px-5 py-3 shadow-xl flex items-center gap-2 text-xs font-bold uppercase tracking-[0.18em]"
                 style={{ clipPath: 'polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%)' }}>
              <span className="h-2 w-2 bg-emerald-400" />
              {state.toast.msg}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
